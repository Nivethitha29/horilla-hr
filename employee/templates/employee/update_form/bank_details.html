{% load i18n %}
<div class="oh-wrapper">
    <div class="oh-general__tab-target oh-profile-section mb-4{% if not active_tab or active_tab != 'bank' %} d-none{% endif %}" id="bank">
        <div class="oh-profile-section__card">
            {% include 'employee/update_form/edit_form_back_button.html' %}
            <form
                method="post"
                hx-post="{% url 'employee-view-update' obj_id %}"
                hx-target="#employee-update-form-root"
                hx-swap="outerHTML"
                hx-push-url="{% url 'employee-view-update' obj_id %}{% if container_mode %}?container=true{% endif %}"
                hx-on::after-request="if(event.detail.successful){var b=document.getElementById('reloadMessagesButton');if(b)b.click();}"
                action="{% url 'employee-view-update' obj_id %}"
            >
                <div id="bankMessage">
                </div>
                {% csrf_token %}
                {% if container_mode %}<input type="hidden" name="container" value="true">{% endif %}
                <input type="hidden" name="form" value="bank">
                {{bank_form.as_p}}
            <hr class="mt-5 mb-3">
            <div class="w-100 d-flex align-items-center justify-content-end">
                <button type="submit" class="oh-btn oh-btn--secondary oh-btn--w-100-resp">
                {% trans "Save" %}
                </button>
            </div>
            </form>
        </div>
    </div>
    </div>
</div>
