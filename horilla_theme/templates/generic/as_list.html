{% load i18n %}
<form class="pt-5" hx-get="{% url 'toggle-columns' %}" hx-swap="none">
	<input type="hidden" name="path" value="{{request.path_info}}" />
	<ul class="oh-dropdown__items toggleForm">
		<div class="oh-dropdown_btn-header oh-btn-group">
			<button
				onclick="
					$(this)
						.closest('form')
						.find('[type=checkbox]')
						.prop('checked', true);
					$(this)
						.closest('form')
						.find('[type=checkbox]')
						.siblings('input[type=hidden]')
						.val('');
					$(this).closest('form').find('[type=submit]').click();
				"
				class="oh-btn oh-btn--success-outline text-sm"
			>
				{% trans "Select All Records" %}
			</button>
			<button
				onclick="
					$(this)
						.closest('form')
						.find('[type=checkbox]')
						.prop('checked', false);
					$(this)
						.closest('form')
						.find('[type=checkbox]')
						.siblings('input[type=hidden]')
						.val('off');
					$(this).closest('form').find('[type=submit]').click();
				"
				class="oh-btn oh-btn--primary-outline text-sm"
			>
				{% trans "Unselect All Records" %}
			</button>
		</div>

		{% for field in form.visible_fields %}
		<li class="oh-dropdown__item oh-sticy-dropdown-item">
            {% if forloop.counter  == 1 %}
                <span class="text-sm">{{field.label}}</span>
            {% else %}
                <div class="cursor-grab">
                    <span class="text-secondary me-3 fs-5">≡</span>
                    <span class="text-sm">{{field.label}}</span>
                </div>
            {% endif %}
			<span class="oh-table__checkbox">
				<input
					type="hidden"
					name="{{field.name}}"
					onchange="
						$(this).closest('form').find('[type=submit]').click()
					"
					{% if not field.initial %}
					    value="false"
					{% endif %}
				/>
				<input
					type="checkbox"
					class="custom-checkbox"
					id="toggle_{{field.name}}"
					{% if field.initial %}
					    checked
					{% endif %}
					onclick="
						value = '';
						if (!$(this).is(':checked')) {
							value = 'off';
						}
						$(this)
							.siblings('input[type=hidden]')
							.val(value)
							.change();
					"
				/>
			</span>
		</li>
		{% endfor %}
	</ul>
	<input type="submit" hidden />
</form>

<script>
    $(".toggleForm").sortable({
        items: "> li:not(:first)",
        cancel: ":first",
        stop: function () {
            $(this).closest('form').find('[type=submit]').click();
        }
    });
</script>
