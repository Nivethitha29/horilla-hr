{% extends "index.html" %}
{% load static %}
{% load i18n %}
{% block content %}

<style>
  .pretax--dot{
    background-color:red;
  }
  .not-fixed--dot{
    background-color:yellowgreen;
  }
  .fixed--dot{
    background-color:orange;
  }
  {% comment %} .fixed-True{
    border-left: 3.4px solid orange !important;
    border-radius: 4px 0 0 4px;

  }
  .fixed-False {

    border-left: 3.4px solid yellowgreen !important;
    border-radius: 4px 0 0 4px;


  }
  .pretax-True {

    border-left: 3.4px solid red !important;
    border-radius: 4px 0 0 4px;

  } {% endcomment %}
</style>

<meta name="csrf-token" content="{{ csrf_token }}">
<div id="payrollDeductionsNavBar">
  <div hx-get="{% url "deduction-view-nav" %}" hx-trigger="load"></div>
</div>


{% include "generic/components.html" %}
<div class="oh-checkpoint-badge mb-2" id="selectedInstances" data-ids="[]" data-clicked="" style="display: none">
</div>


<div class="oh-wrapper"
   id="listContainer">
  <div class="animated-background">
</div>
</div>

<script>
  (function () {
    function syncDeductionsNavVisibility() {
      var nav = document.getElementById("payrollDeductionsNavBar");
      var list = document.getElementById("listContainer");
      if (!nav || !list) return;
      var isForm = !!list.querySelector("#contractFormTarget");
      nav.style.display = isForm ? "none" : "";
    }
    function refreshDeductionsListContainer() {
      if (typeof htmx === "undefined") return;
      var query = window.location.search || "";
      var url = "{% url 'deduction-view-list' %}" + query;
      htmx.ajax("GET", url, { target: "#listContainer", swap: "innerHTML" });
      var $msg = $("#reloadMessagesButton");
      if ($msg.length) $msg.click();
    }
    document.addEventListener("reloadPayrollDeductions", function () {
      refreshDeductionsListContainer();
    });
    document.addEventListener("DOMContentLoaded", syncDeductionsNavVisibility);
    document.body.addEventListener("htmx:afterSwap", function (e) {
      if (e.detail && e.detail.target && e.detail.target.id === "listContainer") {
        syncDeductionsNavVisibility();
        setTimeout(syncDeductionsNavVisibility, 0);
      }
    });
    document.body.addEventListener("htmx:afterSettle", function (e) {
      if (e.detail && e.detail.target && e.detail.target.id === "listContainer") {
        syncDeductionsNavVisibility();
      }
    });
  })();
</script>
{% endblock %}
